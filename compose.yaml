name: kakeibo

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      NODE_ENV: development
      DEV_AUTH_BYPASS: "true"
      WRANGLER_SEND_METRICS: "false"
    command: >
      sh -lc "
        cd apps/api &&
        npm run migrate:local &&
        npm run dev -- --ip 0.0.0.0 --port 8787 --persist-to .wrangler/state --var DEV_AUTH_BYPASS:true
      "
    ports:
      - "8787:8787"
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/apps/api/node_modules
      - /workspace/apps/mobile/node_modules
      - /workspace/packages/shared/node_modules
      - /workspace/apps/mobile/dist

  mobile:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    working_dir: /workspace
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://127.0.0.1:8787
    command: npm run dev --prefix apps/mobile -- --host 0.0.0.0 --port 5173
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/apps/api/node_modules
      - /workspace/apps/mobile/node_modules
      - /workspace/packages/shared/node_modules
